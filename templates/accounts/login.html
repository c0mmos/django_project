{% extends 'account.html' %}
{% load static %}

{% block main %}
    <div id="body">
        <h2>Log In</h2>
        <form action="{% url 'accounts:login' %}" method="post">
            {% csrf_token %}
            <div class="input-group">
                <img src="{% static 'user.png' %}" alt="user icon" class="input-icon">
                <input type="text" id="Username" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <img src="{% static 'lock.png' %}" alt="lock icon" class="input-icon">
                <input type="password" id="Password" name="password" placeholder="Password" required>
            </div>

            <input type="submit" value="Log In" id="Submit">
        </form>
        <p><a href="{% url 'accounts:forgot-password' %}">Forgot Password?</a></p>
        <p>Do not have an account? <a href="{% url 'accounts:signup' %}">Sign Up</a></p>
    </div>

{% endblock %}
